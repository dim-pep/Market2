syntax = "proto3";

package spot_service;

option go_package = "github.com/dim-pep/Market2/proto/pb/spot_service;spot_service";

import "google/protobuf/timestamp.proto";

service SportInstrumentService {
    rpc ViewMarkets(ViewMarketsRequest) returns (ViewMarketsResponse);
}

message ViewMarketsRequest {
    repeated string user_roles = 1;
}

message ViewMarketsResponse {
    repeated Market markets = 1;
}

message Market {
    uint64 id = 1;
    bool enabled = 2;
    optional google.protobuf.Timestamp deleted_at = 3;
}